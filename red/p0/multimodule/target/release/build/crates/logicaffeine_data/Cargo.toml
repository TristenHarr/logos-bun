[package]
name = "logicaffeine-data"
edition = "2021"
rust-version = "1.75"
license = "BUSL-1.1"
description = "WASM-safe data structures and CRDTs - NO IO"
readme = "README.md"

[dependencies]
logicaffeine-base = { path = "../logicaffeine_base" }
# indexmap is pure + wasm-safe (insertion-ordered maps — the LOGOS Map contract).
# DIRECT version, not `workspace = true`: staged builds (hotswap wasm bundles, AOT
# cdylibs, e2e temp projects) copy this crate OUTSIDE the workspace, where
# workspace-inherited third-party deps cannot resolve. Same convention as
# rustc-hash/serde below.
indexmap = { version = "2", features = ["serde"] }
rustc-hash = "2"
serde = { version = "1.0", features = ["derive"] }
# CRITICAL: NO IO DEPENDENCIES - Lamport Invariant
# No tokio, libp2p, std::time::SystemTime allowed

# getrandom is WASM-compatible for random replica ID generation
# js feature enables Web Crypto API on wasm32-unknown-unknown
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
getrandom = "0.2"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
bincode = "1.3"
